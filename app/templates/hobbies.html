{% extends "base.html" %}
{% block content %}
    <section class="hobby-grid">
        <h1>{{ title }}</h1>
        <ul>
        {% for hobby in hobbies %}
            <li>
                <h2>{{hobby.name}}</h2>
                <img src="{{hobby.image}}" alt = "{{hobby.altTxt}}">
                <p>{{hobby.desc}}</p>
            </li>
        {% endfor %}
        </ul>
    </section>
{% endblock %}
